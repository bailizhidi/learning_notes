# Book settings
# Learn more at https://jupyterbook.org/customize/config.html

####################################################################

title     : 学习笔记
author    : 杨申义  yangshenyiavic@gmail.com
logo      : images/logo.png
copyright : "2026"

####################################################################

# Force re-execution of notebooks on each build.
# See https://jupyterbook.org/content/execute.html
execute:
  execute_notebooks: auto

# Define the name of the latex output file for PDF builds
latex:
  latex_documents:
    targetname: book.tex

# Add a bibtex file so that we can create citations
bibtex_bibfiles:
  - references.bib

sphinx:
  config:
    bibtex_reference_style: author_year
    numfig: true
  extra_extensions:
    - sphinx_proof

####################################################################

# Table of Contents options
toc:
  numbered: true  # 启用章节编号


parse:
    myst_enable_extensions:
#     # don't forget to list any other extensions you want enabled,
#     # including those that are enabled by default!
    - amsmath
    - dollarmath
    - colon_fence
####################################################################

# Information about where the book exists on the web
repository:
  url: https://github.com/bailizhidi/learning_notes/  # Online location of your book
  path_to_book: ""  # Optional path to your book, relative to the repository root
  branch: master  # Which branch of the repository should be used when creating links (optional)

# Add GitHub buttons to your book
# See https://jupyterbook.org/customize/config.html#add-a-link-to-your-repository
html:
  use_issues_button: true
  use_repository_button: true
  # mathjax_path: "mathjax/es5/tex-mml-chtml.js"
  extra_css:
    - _static/custom.css

url: https://bailizhidi.github.io
baseurl: /learning_notes/
  
####################################################################